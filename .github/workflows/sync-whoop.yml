name: Sync WHOOP Tennis Data

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch WHOOP data and write data.json
        id: fetch
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs = require('fs');

          const CLIENT_ID     = process.env.WHOOP_CLIENT_ID;
          const CLIENT_SECRET = process.env.WHOOP_CLIENT_SECRET;
          const REFRESH_TOKEN = process.env.WHOOP_REFRESH_TOKEN;
          const TENNIS_SPORT_ID = 34;

          function post(url, params) {
            return new Promise((resolve, reject) => {
              const body = new URLSearchParams(params).toString();
              const u = new URL(url);
              const req = https.request({
                hostname: u.hostname, port: 443, path: u.pathname,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/x-www-form-urlencoded',
                  'Content-Length': Buffer.byteLength(body),
                  'Accept': 'application/json'
                }
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try { resolve({ status: res.statusCode, data: JSON.parse(data) }); }
                  catch(e) { reject(new Error('JSON parse error: ' + data)); }
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          function get(url, token) {
            return new Promise((resolve, reject) => {
              const u = new URL(url);
              const req = https.request({
                hostname: u.hostname, port: 443,
                path: u.pathname + u.search, method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' }
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try { resolve({ status: res.statusCode, data: JSON.parse(data) }); }
                  catch(e) { reject(new Error('JSON parse error: ' + data)); }
                });
              });
              req.on('error', reject);
              req.end();
            });
          }

          async function run() {
            console.log('Refreshing WHOOP access token...');
            const tokenResp = await post('https://api.prod.whoop.com/oauth/oauth2/token', {
              grant_type: 'refresh_token',
              refresh_token: REFRESH_TOKEN,
              client_id: CLIENT_ID,
              client_secret: CLIENT_SECRET,
              scope: 'offline'
            });

            if (tokenResp.status !== 200) {
              console.error('Token refresh failed:', JSON.stringify(tokenResp.data));
              process.exit(1);
            }

            const accessToken = tokenResp.data.access_token;
            const newRefreshToken = tokenResp.data.refresh_token;
            console.log('Token refreshed successfully.');

            if (process.env.GITHUB_OUTPUT) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, 'new_refresh_token=' + newRefreshToken + '\n');
            }

            console.log('Fetching tennis workouts (sport_id=' + TENNIS_SPORT_ID + ')...');
            const cutoff = new Date('2026-01-01T00:00:00Z');
            let allWorkouts = [];
            let nextToken = null;
            let pages = 0;

            do {
              let url = 'https://api.prod.whoop.com/developer/v2/activity/workout?limit=25';
              if (nextToken) url += '&nextToken=' + encodeURIComponent(nextToken);

              const resp = await get(url, accessToken);
              if (resp.status !== 200) {
                console.error('Workout fetch failed:', JSON.stringify(resp.data));
                process.exit(1);
              }

              const records = resp.data.records || [];
              const tennis = records.filter(w => {
                if (w.sport_id !== TENNIS_SPORT_ID) return false;
                return new Date(w.start || w.created_at || '') >= cutoff;
              });
              allWorkouts = allWorkouts.concat(tennis);
              nextToken = resp.data.next_token || null;
              pages++;

              const oldest = records[records.length - 1];
              if (oldest && new Date(oldest.start || oldest.created_at || '') < cutoff) break;
              if (pages > 20) break;
            } while (nextToken);

            console.log('Found ' + allWorkouts.length + ' tennis sessions from 2026+');

            const sessions = allWorkouts.map(w => {
              const d = new Date(w.start || w.created_at);
              const dateStr = d.toISOString().split('T')[0];
              const strain = w.score && w.score.strain ? Math.round(w.score.strain * 10) / 10 : 0;
              return {
                id: 'whoop-api-' + (w.id || w.workout_id),
                date: dateStr,
                strain,
                duration: null,
                recovery: null,
                source: 'whoop-api'
              };
            });

            let existingData = { sessions: [], lastSync: null };
            try { existingData = JSON.parse(fs.readFileSync('data.json', 'utf8')); }
            catch(e) { console.log('No existing data.json — creating fresh.'); }

            const existingMap = new Map((existingData.sessions || []).map(s => [s.id, s]));
            let added = 0, preserved = 0;
            sessions.forEach(s => {
              if (existingMap.has(s.id)) { preserved++; }
              else { existingMap.set(s.id, s); added++; }
            });

            const merged = Array.from(existingMap.values()).sort((a, b) => new Date(a.date) - new Date(b.date));
            fs.writeFileSync('data.json', JSON.stringify({
              sessions: merged,
              lastSync: new Date().toISOString(),
              syncStats: { added, preserved, total: merged.length }
            }, null, 2));
            console.log('data.json written: ' + added + ' new, ' + preserved + ' preserved, ' + merged.length + ' total.');
          }

          run().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Install PyNaCl
        run: pip install PyNaCl --break-system-packages

      - name: Auto-update WHOOP_REFRESH_TOKEN secret
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          NEW_TOKEN: ${{ steps.fetch.outputs.new_refresh_token }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$NEW_TOKEN" ]; then
            echo "No new token to update."
            exit 0
          fi

          echo "Fetching repo public key..."
          KEY_DATA=$(curl -s \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/secrets/public-key")

          KEY_ID=$(echo "$KEY_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['key_id'])")
          PUB_KEY=$(echo "$KEY_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['key'])")

          echo "Encrypting and updating secret..."
          python3 - <<PYEOF
          import base64, os, subprocess, json
          from nacl import encoding, public

          pub_key_bytes = base64.b64decode("$PUB_KEY")
          box = public.SealedBox(public.PublicKey(pub_key_bytes))
          encrypted = box.encrypt(os.environ['NEW_TOKEN'].encode())
          encrypted_b64 = base64.b64encode(encrypted).decode()

          import urllib.request
          payload = json.dumps({"encrypted_value": encrypted_b64, "key_id": "$KEY_ID"}).encode()
          req = urllib.request.Request(
            "https://api.github.com/repos/$REPO/actions/secrets/WHOOP_REFRESH_TOKEN",
            data=payload,
            method="PUT",
            headers={
              "Authorization": "Bearer " + os.environ['PAT_TOKEN'],
              "Accept": "application/vnd.github+json",
              "Content-Type": "application/json"
            }
          )
          try:
            resp = urllib.request.urlopen(req)
            print("WHOOP_REFRESH_TOKEN updated successfully. Token rotation is now fully automated.")
          except urllib.error.HTTPError as e:
            print("Secret update failed:", e.code, e.read())
            exit(1)
          PYEOF

      - name: Commit data.json to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: sync WHOOP tennis data $(date -u '+%Y-%m-%d')"
          git push
